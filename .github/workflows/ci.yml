name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: ESLint
        run: npx next lint --max-warnings 0
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npx jest --passWithNoTests --ci
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'
          SKIP_ENV_VALIDATION: 'true'

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: productlobby_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/productlobby_e2e?schema=public'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      BASE_URL: 'http://localhost:3000'
      JWT_SECRET: 'e2e-ci-jwt-secret-not-for-production'
      # E2E_TEST=1 marks this production build/server as an end-to-end test
      # run. Combined with DISABLE_RATE_LIMIT=1 it bypasses the durable
      # rate limiter (src/lib/rate-limit.ts — e.g. the magic-link 5/IP/15min
      # limit), and RATE_LIMIT_MAX_REQUESTS=0 disables the middleware's
      # per-IP API cap (src/middleware.ts). All three are ignored on real
      # deployments (Vercel sets VERCEL=1, which hard-disables the escape
      # hatches regardless of flags).
      E2E_TEST: '1'
      DISABLE_RATE_LIMIT: '1'
      RATE_LIMIT_MAX_REQUESTS: '0'
      # The e2e helpers sign in via direct-mode magic links (the JSON
      # response includes the link when no email provider is configured).
      # A production build refuses direct mode without this existing
      # operator escape hatch (see src/app/api/auth/magic-link/route.ts).
      ALLOW_DIRECT_MAGIC_LINK: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Push Prisma schema
        run: npx prisma db push --skip-generate

      - name: Seed database
        run: npx --yes tsx prisma/seed.ts

      - name: Build Next.js
        run: npx next build

      - name: Start Next.js server
        run: |
          npx next start -p 3000 > next-server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3000 > /dev/null || {
            echo "Server failed to start"; cat next-server.log; exit 1;
          }

      - name: Run Playwright tests
        run: npx playwright test

      - name: Show server log on failure
        if: failure()
        run: cat next-server.log || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  prisma-check:
    name: Prisma Schema Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check for pending migrations
        run: npx prisma format --check || echo "Schema formatting check complete"
